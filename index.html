<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AE Motion Agent</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app" class="panel-root">
      <!-- Tab bar -->
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="chat">Chat</button>
        <button class="tab-btn" data-tab="presets">Presets &amp; Logs</button>
        <div class="tab-bar-right">
          <select id="model-select" class="btn model-selector">
            <optgroup label="Cloud.ru">
              <option value="cloudru/Qwen/Qwen3-Coder-Next">Qwen3 Coder</option>
              <option value="cloudru/openai/gpt-oss-120b">GPT-OSS 120B</option>
            </optgroup>
          </select>
        </div>
      </div>

      <!-- Tab: Chat -->
      <div class="tab-panel active" data-tab="chat">
        <div id="chat-transcript" class="chat-transcript"></div>
        <div id="active-comp-note" class="active-comp-note">Active composition: loading...</div>
        <div id="status-line" class="status-line">
          <span id="status-text">Ready</span>
          <span id="model-status" class="model-status model-status-unknown">model: unknown</span>
        </div>
        <div class="chat-input-container">
          <textarea
            id="user-input"
            class="chat-input"
            rows="2"
            placeholder="Describe what to animate, create, or fix... (Enter to send, Shift+Enter for newline)"
          ></textarea>
          <div class="chat-actions">
            <button id="send-btn" class="btn btn-primary" title="Send message (Enter). Shift+Enter for new line.">Send</button>
            <button id="cancel-btn" class="btn btn-danger" style="display:none" title="Cancel the running agent">Stop</button>
          </div>
        </div>
      </div>

      <!-- Tab: Presets & Logs -->
      <div class="tab-panel" data-tab="presets">
        <!-- Presets section -->
        <div class="presets-section">
          <div class="section-label">Motion Presets</div>
          <div class="preset-bar">
            <div class="preset-dropdown">
              <button id="preset-dropdown-btn" class="btn preset-dropdown-btn" type="button" title="Deterministic motion preset">Fade In</button>
              <div id="preset-dropdown-menu" class="preset-dropdown-menu" style="display:none">
                <button type="button" class="preset-option-btn" data-preset="fade_in">Fade In</button>
                <button type="button" class="preset-option-btn" data-preset="fade_out">Fade Out</button>
                <button type="button" class="preset-option-btn" data-preset="pop_in">Pop In</button>
                <button type="button" class="preset-option-btn" data-preset="pop_out">Pop Out</button>
                <button type="button" class="preset-option-btn" data-preset="slide_left">Slide Left</button>
                <button type="button" class="preset-option-btn" data-preset="slide_right">Slide Right</button>
                <button type="button" class="preset-option-btn" data-preset="slide_up">Slide Up</button>
                <button type="button" class="preset-option-btn" data-preset="slide_down">Slide Down</button>
              </div>
            </div>
            <div class="preset-field">
              <label class="preset-field-label" for="preset-duration">Duration (s)</label>
              <input id="preset-duration" class="preset-input" type="number" step="0.01" min="0.05" value="0.45" title="Duration (seconds)" />
            </div>
            <div class="preset-field">
              <label class="preset-field-label" for="preset-delay">Delay (s)</label>
              <input id="preset-delay" class="preset-input" type="number" step="0.01" min="0" value="0" title="Delay (seconds)" />
            </div>
            <div class="preset-field">
              <label id="preset-strength-label" class="preset-field-label" for="preset-strength">Strength</label>
              <input id="preset-strength" class="preset-input" type="number" step="0.01" value="" title="Intensity for pop / amplitude(px) for slide" />
            </div>
            <button id="apply-preset-btn" class="btn btn-secondary" title="Apply selected preset to selected layers">Apply preset</button>
          </div>

          <!-- Brand presets -->
          <div class="section-label" style="margin-top:8px">Brand Presets (Cloud.ru)</div>
          <div class="preset-bar brand-preset-bar">
            <div class="preset-dropdown">
              <button id="brand-dropdown-btn" class="btn preset-dropdown-btn" type="button" title="Cloud.ru brand preset">Logo Reveal</button>
              <div id="brand-dropdown-menu" class="preset-dropdown-menu" style="display:none">
                <button type="button" class="preset-option-btn" data-brand-preset="logo_reveal">Logo Reveal</button>
                <button type="button" class="preset-option-btn" data-brand-preset="lower_third">Lower Third</button>
                <button type="button" class="preset-option-btn" data-brand-preset="text_card">Text Card</button>
              </div>
            </div>
            <div class="preset-field brand-text-field" id="brand-field1-wrap">
              <label id="brand-field1-label" class="preset-field-label" for="brand-field1">Name</label>
              <input id="brand-field1" class="preset-input brand-text-input" type="text" value="" placeholder="Speaker Name" />
            </div>
            <div class="preset-field brand-text-field" id="brand-field2-wrap">
              <label id="brand-field2-label" class="preset-field-label" for="brand-field2">Title</label>
              <input id="brand-field2" class="preset-input brand-text-input" type="text" value="" placeholder="Job Title" />
            </div>
            <div class="preset-field">
              <label class="preset-field-label" for="brand-duration">Duration (s)</label>
              <input id="brand-duration" class="preset-input" type="number" step="0.1" min="0.5" value="5" />
            </div>
            <button id="apply-brand-btn" class="btn btn-secondary" title="Create brand preset in active comp">Apply</button>
          </div>

          <!-- Quick actions -->
          <div class="section-label" style="margin-top:8px">Quick Actions</div>
          <div class="quick-actions" id="quick-actions">
            <button class="quick-action-btn" data-prompt="Add wiggle(3, 25) to selected layers" title="Apply wiggle expression to selection">Wiggle</button>
            <button class="quick-action-btn" data-prompt="Create a counter from 0 to 100 on selected text layer" title="Counter expression on text">Counter</button>
            <button class="quick-action-btn" data-prompt="Animate selected layers in from the left with easing" title="Slide in from left">Slide In</button>
            <button class="quick-action-btn" data-prompt="Add bounce easing expression to all keyframes on selected layers" title="Bounce overshoot on keyframes">Bounce</button>
            <button class="quick-action-btn" data-prompt="Capture current frame preview" title="Save and show current comp frame">Preview</button>
          </div>
        </div>

        <!-- Compact LLM tool call log -->
        <div class="log-section">
          <div class="section-label">Tool Call Log</div>
          <div id="tool-log" class="tool-log"></div>
        </div>
      </div>

      <!-- Shared footer -->
      <div class="panel-footer">
        <button id="undo-btn" class="btn btn-warning" title="Undo ALL agent actions from last request">Undo</button>
        <button id="clear-session-btn" class="btn btn-secondary" title="Clear all messages in the current session">Clear</button>
        <button id="export-sessions-btn" class="btn btn-secondary" title="Export session to JSON on Desktop">Export</button>
        <button id="export-errors-btn" class="btn btn-secondary" title="Export errors only → JSON on Desktop">Errors</button>
        <button id="report-btn" class="btn btn-secondary" title="Analyze session with LLM and generate a bug report on Desktop">Report</button>
      </div>
    </div>

    <!-- Config (load order matters) -->
    <script src="./config/example.config.js"></script>
    <script src="./config/runtime-config.js"></script>
    <script src="./config/secrets.local.js"></script>

    <!-- Libraries -->
    <script src="./lib/CSInterface.js"></script>

    <!-- New agent modules -->
    <script src="./brandPresets.js"></script>
    <script src="./toolRegistry.js"></script>
    <script src="./agentSystemPrompt.js"></script>
    <script src="./chatProvider.js"></script>
    <script src="./hostBridge.js"></script>
    <script src="./agentToolLoop.js"></script>

    <!-- Main runtime (must be last) -->
    <script src="./main.js"></script>
  </body>
</html>
