<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AE Motion Agent</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app" class="panel-root">
      <aside class="sidebar">
        <div class="sidebar-header">
          <button id="new-session-btn" class="btn btn-primary" title="New chat session">New</button>
        </div>
        <ul id="session-list" class="session-list"></ul>
        <div class="sidebar-footer">
          <button id="rename-session-btn" class="btn btn-secondary">Rename</button>
          <button id="clear-session-btn" class="btn btn-secondary">Clear</button>
          <button id="clear-all-btn" class="btn btn-danger">Clear All</button>
        </div>
      </aside>
      <main class="chat-area">
        <div id="chat-transcript" class="chat-transcript"></div>
        <div id="status-line" class="status-line">
          <span id="status-text">Ready</span>
          <span id="model-status" class="model-status model-status-unknown">model: unknown</span>
        </div>
        <div class="provider-bar">
          <select id="model-select" class="btn model-selector">
            <optgroup label="Cloud.ru">
              <option value="cloudru/Qwen/Qwen3-Coder-Next">Qwen3 Coder</option>
              <option value="cloudru/openai/gpt-oss-120b">GPT-OSS 120B</option>
            </optgroup>
            <optgroup id="ollama-optgroup" label="Local (Ollama)" style="display:none">
            </optgroup>
          </select>
          <button id="undo-btn" class="btn btn-warning" title="Undo last agent action (Ctrl+Z in AE)">Undo</button>
        </div>
        <div class="chat-input-container">
          <textarea
            id="user-input"
            class="chat-input"
            rows="3"
            placeholder="Describe what you want to animate, create, or improve..."
          ></textarea>
          <div class="chat-actions">
            <button id="send-btn" class="btn btn-primary">Send</button>
          </div>
        </div>
      </main>
    </div>

    <!-- Config (load order matters) -->
    <script src="./config/example.config.js"></script>
    <script src="./config/runtime-config.js"></script>
    <script src="./config/secrets.local.js"></script>

    <!-- Existing modules (kept for backward compat) -->
    <script src="./diagnostics.js"></script>
    <script src="./knowledge-base/index/corpusIndex.js"></script>
    <script src="./prompt-library/promptsBundle.js"></script>
    <script src="./pipelineAssembly.js"></script>
    <script src="./systemPrompt.js"></script>
    <script src="./aeDocsIndex.js"></script>
    <script src="./aeDocsRetrieval.js"></script>
    <script src="./aePromptContext.js"></script>
    <script src="./aeResponseValidation.js"></script>
    <script src="./lib/captureMacOS.js"></script>
    <script src="./lib/ollamaVision.js"></script>
    <script src="./lib/CSInterface.js"></script>

    <!-- New agent modules -->
    <script src="./toolRegistry.js"></script>
    <script src="./agentSystemPrompt.js"></script>
    <script src="./chatProvider.js"></script>
    <script src="./hostBridge.js"></script>
    <script src="./agentToolLoop.js"></script>

    <!-- Main runtime (must be last) -->
    <script src="./main.js"></script>
  </body>
</html>
